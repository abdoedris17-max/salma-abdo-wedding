<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Salma &amp; Abdo — 18 September 2026</title>
  <meta name="description" content="Salma &amp; Abdo invite you to their wedding — Friday 18th September 2026, Cairo, Egypt." />
  <meta name="theme-color" content="#bcd7df" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <!-- The whole invitation is one image now (text is baked in), so no web fonts. -->
  <link rel="preload" as="image" href="assets/invitation.webp?v=1" type="image/webp" />
  <link rel="stylesheet" href="styles.css?v=9" />
</head>

<body>
  <!--
    The invitation is ONE tall illustration with all text baked in. We show it
    full-width in a centered phone-width column, and lay an invisible layer of
    <a> "hotspots" over the printed link labels/buttons so they're tappable. Each
    hotspot is positioned in % of the image, so it tracks the artwork at any width.
    To re-align a hotspot later, append ?debug=1 to the URL to tint them red.
    Swap-later URLs live in CONFIG at the top of script.js.
  -->
  <main class="site">
    <div class="invitation">
      <picture>
        <source srcset="assets/invitation.webp?v=1" type="image/webp" />
        <img class="invitation__img" src="assets/invitation.jpg?v=1"
             width="781" height="7427"
             alt="Salma & Abdo wedding invitation — Friday 18th September 2026, Cairo, Egypt."
             fetchpriority="high" decoding="async" />
      </picture>

      <!-- Invisible clickable layer. top/left/width/height are % of the image. -->
      <nav class="hotspots" aria-label="Invitation links">

        <!-- Venue (THE WEDDING → "Click for location") -->
        <a class="hotspot" data-map="venue" target="_blank" rel="noopener"
           aria-label="Open the venue location in Google Maps"
           style="top:27.5%; left:39.5%; width:23.5%; height:0.7%;"></a>

        <!-- CAIRO GUIDE — Recommended hotels (navy pills) -->
        <a class="hotspot" target="_blank" rel="noopener"
           href="https://www.marriott.com/en-us/hotels/caimn-marriott-mena-house-cairo/overview/"
           aria-label="View Marriott Mena House"
           style="top:42.25%; left:39.5%; width:23.5%; height:0.45%;"></a>
        <a class="hotspot" data-special-rate="marriott" target="_blank" rel="noopener"
           aria-label="Marriott Mena House special rate"
           style="top:42.78%; left:39.5%; width:23.5%; height:0.45%;"></a>

        <a class="hotspot" target="_blank" rel="noopener"
           href="https://www.hyatt.com/hyatt-regency/en-US/hberc-hyatt-regency-cairo-west"
           aria-label="View Hyatt Regency Cairo West"
           style="top:44.08%; left:39.5%; width:23.5%; height:0.45%;"></a>
        <a class="hotspot" data-special-rate="hyatt" target="_blank" rel="noopener"
           aria-label="Hyatt Regency special rate"
           style="top:44.62%; left:39.5%; width:23.5%; height:0.45%;"></a>

        <a class="hotspot" target="_blank" rel="noopener"
           href="https://www.fourseasons.com/caironp/"
           aria-label="View Four Seasons Hotel Cairo at Nile Plaza"
           style="top:45.92%; left:39.5%; width:23.5%; height:0.45%;"></a>
        <a class="hotspot" target="_blank" rel="noopener"
           href="https://www.fourseasons.com/caironp/"
           aria-label="View Four Seasons Hotel Cairo at Nile Plaza"
           style="top:47.22%; left:39.5%; width:23.5%; height:0.45%;"></a>
        <a class="hotspot" target="_blank" rel="noopener"
           href="https://hrewards.com/en/steigenberger-pyramids-cairo"
           aria-label="View Steigenberger Pyramids Cairo"
           style="top:48.52%; left:39.5%; width:23.5%; height:0.45%;"></a>
        <a class="hotspot" data-hotel="crowne" target="_blank" rel="noopener"
           href="https://www.google.com/maps/search/?api=1&query=Crowne+Plaza+Cairo+Arkan"
           aria-label="View Crowne Plaza Arkan"
           style="top:49.80%; left:39.5%; width:23.5%; height:0.45%;"></a>

        <!-- OUT & ABOUT — Sights (centred text lines) -->
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Great Pyramids of Giza in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Great+Pyramids+of+Giza"
           style="top:71.75%; left:22%; width:56%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Step Pyramid of Djoser, Saqqara in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Step+Pyramid+of+Djoser+Saqqara"
           style="top:72.48%; left:22%; width:56%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Grand Egyptian Museum in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Grand+Egyptian+Museum"
           style="top:73.15%; left:22%; width:56%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Khan El Khalili and Al Moez St. in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Khan+El+Khalili"
           style="top:73.89%; left:22%; width:56%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Citadel and Mohamed Ali Mosque in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Mosque+of+Muhammad+Ali+Cairo+Citadel"
           style="top:74.63%; left:22%; width:56%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Religious Quarter and Hanging Church in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Hanging+Church+Coptic+Cairo"
           style="top:75.37%; left:22%; width:56%; height:0.55%;"></a>

        <!-- OUT & ABOUT — Restaurants (centred text lines) -->
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Sachi Park St. in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Sachi+Park+St+Cairo"
           style="top:77.95%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Khufu's in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Khufu's+Restaurant+Giza"
           style="top:78.62%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Andrea New Giza in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Andrea+New+Giza"
           style="top:79.29%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Pier88 in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Pier88+Cairo"
           style="top:79.94%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Carlos Zamalek in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Carlos+Zamalek"
           style="top:80.61%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Mazeej Balad in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Mazeej+Balad+Cairo"
           style="top:81.29%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Zooba in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Zooba+Cairo"
           style="top:81.92%; left:28%; width:44%; height:0.55%;"></a>
        <a class="hotspot" target="_blank" rel="noopener" aria-label="Kasr El Kababgy in Maps"
           href="https://www.google.com/maps/search/?api=1&query=Kasr+El+Kababgy+Cairo"
           style="top:82.53%; left:28%; width:44%; height:0.55%;"></a>

        <!-- RSVP (text, no button — covers the heading + tagline) -->
        <a class="hotspot" data-rsvp target="_blank" rel="noopener"
           aria-label="RSVP"
           style="top:93.5%; left:24%; width:52%; height:3.5%;"></a>
      </nav>
    </div>

    <!-- Screen-reader text (the invite is now pictorial) -->
    <p class="sr-only">
      Mr Sherif Farouk Osman &amp; Mrs Soraya Abou Hussein, and Mr Mohamed Edris &amp;
      Mrs Nehal El Hennawy, invite you to the wedding of Salma &amp; Abdo on Friday
      18th September 2026 in Cairo, Egypt. Use the links on the invitation for the venue,
      recommended hotels, things to do, and to RSVP.
    </p>
  </main>

  <script src="script.js?v=5"></script>
</body>
</html>
